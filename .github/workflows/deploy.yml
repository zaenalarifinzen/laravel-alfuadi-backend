name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - master   # sesuaikan dengan branch produksi kamu

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Ambil kode dari repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install dependency JS & compile aset
      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      # 4. (Opsional) Setup PHP kalau butuh composer install juga
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Install composer dependencies
        run: composer install --no-dev --optimize-autoloader

      # 5. Deploy ke Hostinger via FTP
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /          # sesuaikan path di Hostinger
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/.env